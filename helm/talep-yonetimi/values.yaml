replicaCount: 2

image:
  repository: talep-yonetimi
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: talep.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: talep-tls
  #    hosts:
  #      - talep.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

supabase:
  url: ""
  publishableKey: ""
  projectId: ""

nodeSelector: {}
tolerations: []
affinity: {}
