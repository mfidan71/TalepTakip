apiVersion: apps/v1
kind: Deployment
metadata:
  name: talep-yonetimi
  labels:
    app: talep-yonetimi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talep-yonetimi
  template:
    metadata:
      labels:
        app: talep-yonetimi
    spec:
      containers:
        - name: talep-yonetimi
          image: talep-yonetimi:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
