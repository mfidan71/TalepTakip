apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: talep-yonetimi
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: talep.example.com  # Kendi domain'inizi yazın
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: talep-yonetimi
                port:
                  number: 80
